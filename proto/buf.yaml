version: v2
modules:
  - path: .
lint:
  use:
    - STANDARD
  except:
    # Messages here are envelope/handshake shapes, not request/response
    # service contracts. STANDARD's RPC_* rules don't apply.
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_RESPONSE_UNIQUE
    # Keep relay.proto at the top of the proto/ directory — nesting it under
    # dicode/relay/v1/ for one protocol file adds no value.
    - PACKAGE_DIRECTORY_MATCH
breaking:
  use:
    - FILE

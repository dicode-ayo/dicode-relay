name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test:coverage
      - run: npm run build

  publish-docker:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Dual-publish to Docker Hub (primary, user-facing) and ghcr.io
      # (secondary, co-located with the git repo). metadata-action fans
      # the same tag set across both images so a single build-push step
      # pushes both.
      - name: Extract image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            docker.io/dicodeayo/dicode-relay
            ghcr.io/dicode-ayo/dicode-relay
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # release-please-action created the GitHub Release at PR-merge time with
      # the curated changelog. We only *append* install + Docker instructions
      # so the changelog is preserved. NOTE: `${{ steps.meta.outputs.version }}`
      # is the normalized semver (e.g. "0.2.0"), not the tag (`v0.2.0`) — this
      # matches the image tag docker/metadata-action actually pushes.
      - name: Append install instructions to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          append_body: true
          body: |

            ## Install

            ```
            npx dicode-relay
            # or
            npm install -g dicode-relay
            ```

            ## Docker image

            ```
            docker pull dicodeayo/dicode-relay:${{ steps.meta.outputs.version }}
            # or, from GitHub's registry
            docker pull ghcr.io/dicode-ayo/dicode-relay:${{ steps.meta.outputs.version }}
            ```

  publish-npm:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"
      # --ignore-scripts on both install and publish: no transitive postinstall
      # script ever runs in the job that carries NPM_TOKEN, closing the
      # tamper-dist-before-publish supply-chain gap. We invoke `npm run build`
      # explicitly, so losing package-script auto-execution is a non-issue.
      - run: npm ci --ignore-scripts
      - run: npm run build
      - name: Publish to npm
        run: npm publish --ignore-scripts --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
